<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1">
        <thead>
            <tr>
                <th><font color="gray">Período</font></th>
                <th colspan="3">Domingo</th>
                <th colspan="3">Segunda</th>
                <th colspan="3">Terça</th>
                <th colspan="3">Quarta</th>
                <th colspan="3">Quinta</th>
                <th colspan="3">Sexta</th>
                <th colspan="3">Sábado</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th><font color="gray">Manhã</font></th>
                <td colspan="3"><font color="blue">a</font></td>
                <td colspan="3"><font color="red">b</font></td>
                <td colspan="3"><font color="green">c</font></td>
                <td colspan="3"><font color="pink">d</font></td>
                <td colspan="3"><font color="white">e</font></td>
                <td colspan="3"><font color="black">f</font></td>
                <td colspan="3"><font color="purple">g</font></td>
            </tr>
            <tr>
                <th><font color="gray">Tarde</font></th>
                <td colspan="3"><font size="4">a</font></td>
                <td colspan="3"><font size="5">b</font></td>
                <td colspan="3"><font size="6">c</font></td>
                <td colspan="3"><font size="7">d</font></td>
                <td colspan="3"><font size="8">e</font></td>
                <td colspan="3"><font size="9">f</font></td>
                <td colspan="3"><font size="10">g</font></td>
            </tr>
            <tr>
                <th><font color="gray">Noite</font></th>
                <td colspan="3"><font face="Arial">Arial</font></td>
                <td colspan="3"><font face="Verdana">Verdana</font></td>
                <td colspan="3"><font face="Helvetica">Helvetica</font></td>
                <td colspan="3"><font face="Tahoma">Tahoma</font></td>
                <td colspan="3"><font face="Trebuchet MS">Trebuchet MS</font></td>
                <td colspan="3"><font face="Geneva">Geneva</font></td>
                <td colspan="3"><font face="Times">Times</font></td>
            </tr>
        </tbody>
        
    </table>
</body>
</html>
